title: Helm Display
views:
- title: Engines & Nav
  path: engines
  icon: mdi:engine
  type: panel
  kiosk_mode:
    hide_header: true
    hide_sidebar: true
  card_mod:
    style:
      hui-view$: ':host { --ha-view-padding: 0px !important; background: #f0f0f0 !important;
        } #columns { padding: 0 !important; margin: 0 !important; background: #f0f0f0
        !important; }'
      hui-panel-view$: ':host { padding: 0 !important; background: #f0f0f0 !important;
        } .container { padding: 0 !important; background: #f0f0f0 !important; }'
      .: |
        app-header, app-toolbar {
          display: none !important;
        }
        :host {
          --header-height: 0px !important;
        }
  cards:
  - type: vertical-stack
    cards:
    - type: horizontal-stack
      cards:
      - type: custom:canvas-gauge-card
        entity: sensor.helm_port_rpm
        card_height: 210
        gauge:
          type: radial-gauge
          width: 200
          height: 200
          title: PORT RPM
          units: RPM
          minValue: 0
          maxValue: 4400
          majorTicks:
          - '0'
          - '500'
          - '1000'
          - '1500'
          - '2000'
          - '2500'
          - '3000'
          - '3500'
          - '4000'
          - '4400'
          highlights:
          - from: 0
            to: 2800
            color: rgba(83,189,117,0.4)
          - from: 2800
            to: 3600
            color: rgba(255,165,0,0.5)
          - from: 3600
            to: 4400
            color: rgba(220,50,50,0.55)
          colorPlate: '#ffffff'
          colorMajorTicks: '#333'
          colorMinorTicks: '#888'
          colorTitle: '#1a237e'
          colorUnits: '#1a237e'
          colorNumbers: '#222'
          colorNeedle: '#c62828'
          colorNeedleEnd: '#c62828'
          colorValueBoxBackground: '#e0e0e0'
          colorValueText: '#111'
          borderShadowWidth: 0
          borders: false
          needleType: arrow
          needleWidth: 3
          animationDuration: 500
          animationRule: linear
      - type: custom:canvas-gauge-card
        entity: sensor.helm_starboard_rpm
        card_height: 210
