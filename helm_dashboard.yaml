title: Helm Display
views:
- title: Engines & Nav
  path: engines
  icon: mdi:engine
  type: panel
  cards:
  - type: vertical-stack
    cards:
    - type: horizontal-stack
      cards:
      - type: vertical-stack
        cards:
        - type: markdown
          content: <div style="font-weight:bold;color:#90caf9;padding:4px 0 0 8px;">&#9655;
            PORT ENGINE</div>
        - type: custom:canvas-gauge-card
          entity: sensor.helm_port_rpm
          card_height: 600
          gauge:
            type: radial-gauge
            width: 580
            height: 580
            title: RPM
            units: RPM
            minValue: 0
            maxValue: 4400
            majorTicks:
            - '0'
            - '500'
            - '1000'
            - '1500'
            - '2000'
            - '2500'
            - '3000'
            - '3500'
            - '4000'
            - '4400'
            highlights:
            - from: 0
              to: 2800
              color: rgba(83,189,117,0.35)
            - from: 2800
              to: 3600
              color: rgba(255,192,87,0.45)
            - from: 3600
              to: 4400
              color: rgba(234,89,89,0.55)
            colorPlate: '#1a1a2e'
            colorMajorTicks: '#ccc'
            colorMinorTicks: '#666'
            colorTitle: '#90caf9'
            colorUnits: '#90caf9'
            colorNumbers: '#ddd'
            colorNeedle: '#ff6b35'
            colorNeedleEnd: '#ff6b35'
            colorValueBoxBackground: '#0d0d1a'
            colorValueText: '#fff'
            borderShadowWidth: 0
            borders: false
            needleType: arrow
            needleWidth: 3
            animationDuration: 500
            animationRule: linear
        - type: horizontal-stack
          cards:
          - type: custom:canvas-gauge-card
            entity: sensor.sk_port_water_temp
            card_height: 210
            gauge:
              type: radial-gauge
              width: 200
              height: 200
              title: Water C
              units: C
              minValue: 0
              maxValue: 120
              majorTicks:
              - '0'
              - '40'
              - '70'
              - '90'
              - '110'
              - '120'
              colorPlate: '#1a1a2e'
              colorMajorTicks: '#ccc'
              colorMinorTicks: '#666'
              colorTitle: '#90caf9'
              colorUnits: '#90caf9'
              colorNumbers: '#ddd'
              colorNeedle: '#ff6b35'
              colorNeedleEnd: '#ff6b35'
              colorValueBoxBackground: '#0d0d1a'
              colorValueText: '#fff'
              borderShadowWidth: 0
              borders: false
              needleType: arrow
              needleWidth: 2
              animationDuration: 500
              animationRule: linear
              highlights:
              - from: 40
                to: 70
